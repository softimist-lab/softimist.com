      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)" rx="16"/>
  <rect x="60" y="60" width="1080" height="680" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <!-- Play icon -->
  <polygon points="560,360 560,440 630,400" fill="#3b82f6" opacity="0.8"/>
  <!-- Title -->
  <text x="600" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="600" fill="#94a3b8">PlayMist</text>
  <text x="600" y="535" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#64748b">OTT Streaming Platform</text>
