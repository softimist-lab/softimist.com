  <rect x="200" y="168" width="200" height="8" rx="4" fill="#334155"/>
  <rect x="200" y="220" width="800" height="1" fill="#334155"/>
  <!-- Mock UI elements -->
  <rect x="200" y="250" width="160" height="90" rx="6" fill="#334155"/>
  <rect x="380" y="250" width="160" height="90" rx="6" fill="#334155"/>
  <rect x="560" y="250" width="160" height="90" rx="6" fill="#334155"/>
